name: Trigger Ubuntu22.04 CI
run-name: Ubuntu22.04 - ${{ github.event.pull_request.title }}

on:
  pull_request_target:
    types: labeled
    paths:
    - 'images/ubuntu/**'

defaults:
  run:
    shell: pwsh

stages:
- stage: MyStage
  jobs:
  - job: MyJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: echo Hello, world!
