name: Check Apache and Nginx Ports
on: [push, pull_request]

jobs:
  check-ports:
    runs-on: windows-2019
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run netstat command
      run: |
        netstat -ano | findstr :80
        netstat -ano | findstr :443

    - name: Check Apache and Nginx Services
      shell: powershell
      run: |
        if ((Get-Service -Name 'Apache2.4.55') -and (Get-Service -Name 'Apache2.4.55').Status -eq 'Running') {
          Write-Output "Apache is running."
        } else {
          Write-Output "Apache is not running."
        }

        if ((Get-Service -Name 'nginx') -and (Get-Service -Name 'nginx').Status -eq 'Running') {
          Write-Output "Nginx is running."
        } else {
          Write-Output "Nginx is not running."
        }
